name: Feature request
description: Suggest a SnapAnchor workflow or improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or workflow
      description: What are you trying to accomplish, and what currently gets in the way?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behaviour
      description: Describe the interaction and expected result.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: privacy
    attributes:
      label: Does this require a network or cloud service?
      options:
        - No
        - Optional integration
        - Yes
        - Unsure
    validations:
      required: true
  - type: checkboxes
    id: originality
    attributes:
      label: Originality
      options:
        - label: This request does not include proprietary source code, icons, branding, or packaged assets from another product.
          required: true
